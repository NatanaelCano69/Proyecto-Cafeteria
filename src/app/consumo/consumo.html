<div class="consumo-wrapper">
  <div class="container">
    <header class="header">
      <h1>Cafetería</h1>
      <p class="subtitle">Escaneo de Credenciales</p>
    </header>

    <!-- Input invisible para lector -->
    <input type="text" #codigo autofocus class="scanner-input"
      (keydown.enter)="$event.preventDefault(); registrarConsumo(codigo.value); codigo.value=''" (blur)="onBlur()" />

    <div class="result-area">
      <div *ngIf="resultado" class="card card-success animate-in">
        <div class="card-icon">✔</div>
        <div class="card-content">
          <h2>{{ resultado.usuario }}</h2>
          <div class="stats">
            <div class="stat-item">
              <span class="label">Consumo actual</span>
              <span class="value">${{ resultado.monto }}</span>
            </div>
            <div class="stat-item">
              <span class="label">Deuda total</span>
              <span class="value highlighted">${{ resultado.deuda_total }}</span>
            </div>
          </div>
          <span class="status-msg">Consumo registrado exitosamente</span>
        </div>
      </div>

      <div *ngIf="error" class="card card-error animate-in">
        <div class="card-icon">❌</div>
        <div class="card-content">
          <h2>Error de escaneo</h2>
          <p>{{ error }}</p>
        </div>
      </div>

      <div *ngIf="!resultado && !error" class="card card-idle">
        <div class="pulse-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h3M17 4h3v3M20 17v3h-3M7 20H4v-3M9 12h6M12 9v6" />
          </svg>
        </div>
        <p class="hint">Listo para escanear credencial</p>
      </div>
    </div>
  </div>
</div>
