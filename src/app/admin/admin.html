<div class="admin-container">

  <h1>⚙️ Administración Cafetería</h1>

  <!-- REGISTRO USUARIOS -->
  <section class="card">
    <h2>➕ Registrar usuario</h2>

    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="nuevoUsuario.nombre">

    <input
      type="text"
      placeholder="Código de barras"
      [(ngModel)]="nuevoUsuario.codigo_barra">

    <button (click)="crearUsuario()">Registrar</button>
  </section>

  <!-- LISTA USUARIOS -->
  <section class="card">
    <h2>👥 Usuarios</h2>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Consumos</th>
          <th>Deuda</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios">
          <td>{{ u.nombre }}</td>
          <td>{{ u.total_consumos }}</td>
          <td>${{ u.deuda_total }}</td>
        </tr>
      </tbody>
    </table>
  </section>

  <!-- REPORTES -->
  <section class="card" *ngIf="reporte">
    <h2>📊 Reporte general</h2>
    <p>Total consumos: <strong>{{ reporte.total_consumos }}</strong></p>
    <p>Total deuda: <strong>${{ reporte.total_deuda }}</strong></p>
  </section>

</div>
